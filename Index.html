<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Expense Tracker</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <!-- LEFT SIDE -->
      <div class="left-panel">
        <h2 class="heading">Expense Tracker</h2>

        <!-- Budget Left Card -->
        <div class="card budget-left-card">
          <h3>Budget Left</h3>

          <h1 id="budgetLeft">₹5000</h1>

          <div class="pie-chart" id="pie"></div>
        </div>

        <!-- Budget Summary -->
        <div class="summary">
          <div class="card small-card">
            <p>Total Budget</p>

            <h2 id="totalBudget">₹5000</h2>
          </div>

          <div class="card small-card">
            <p>Total Expense</p>

            <h2 id="totalExpense">₹0</h2>
          </div>
           <div class="foot">
            © 2026 Expense Tracker | Designed & Developed by &copy;
            <span>Ganesh Patil</span>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right-panel">
        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active">Add Expense</button>

          <button class="tab">Change Budget</button>
        </div>

        <!-- Expense Form -->
        <div class="card form-card">
          <h2>Add New Expense</h2>

          <div class="input-group">
            <label>Expense Name</label>

            <input type="text" id="title" placeholder="Enter Expense Name" />
          </div>

          <div class="input-group">
            <label>Amount</label>

            <input type="number" id="amount" placeholder="Enter Amount" />
          </div>

          <button id="addBtn" class="primary-btn">
            <i class="fa-solid fa-plus"></i>

            Add Expense
          </button>
        </div>

        <!-- Change Budget -->
        <div class="card form-card">
          <h2>Change Budget</h2>

          <div class="input-group">
            <label>Budget Amount</label>

            <input type="number" id="budgetInput" placeholder="Enter Budget" />
          </div>

          <button id="budgetBtn" class="primary-btn">Update Budget</button>
        </div>

        <!-- History -->
        <div class="history-section">
          <div class="history-header">
            <h2>Expense History</h2>

            <select id="sort">
              <option value="latest">Latest</option>

              <option value="old">Oldest</option>

              <option value="high">Highest</option>

              <option value="low">Lowest</option>
            </select>
          </div>

          <div id="history">
            <!-- JavaScript will add expenses here -->
          </div>
        </div>
      </div>
    </div>



    <script src="script.js"></script>
  </body>
</html>
